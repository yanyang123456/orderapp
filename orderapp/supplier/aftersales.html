<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>售后工单</title><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"></head>
<body><div class="phone-stage"><div class="phone-frame"><div class="phone-inner"><div class="app-bg"></div><div class="status-bar"><span class="status-pill">9:41</span><div class="status-icons"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-three-quarters"></i></div></div><main class="app-shell"><div class="top-nav"><button class="icon-btn"><i class="fa-solid fa-filter"></i></button><div class="nav-title"><h1>售后工单</h1><p>破损、少件、错发、质量与退换货</p></div><button class="icon-btn primary"><i class="fa-solid fa-headset"></i></button></div><div class="content-scroll">
<section class="hero-card"><span class="eyebrow"><i class="fa-solid fa-triangle-exclamation"></i> 待供应商确认</span><h2>7 个工单</h2><p>平均响应 1.8 小时，超时将影响售后率与服务评分。</p><div class="hero-metrics"><div class="metric-tile"><div class="label">运输破损</div><div class="value">3</div></div><div class="metric-tile"><div class="label">退换货申请</div><div class="value">2</div></div></div></section>
<section class="section-block"><div class="card-surface list-stack"><div class="case-item"><div class="badge-icon icon-btn"><i class="fa-solid fa-box-open"></i></div><div class="item-copy"><h4>AS24051809 · 运输破损</h4><p>岩板餐桌边角破损，客户上传 3 张图片，需确认补发或重新配送。</p><div class="tag-row" style="margin-top:8px"><span class="tag">补发配件</span><span class="tag">上传凭证</span></div></div><span class="pill danger">2h</span></div><div class="divider"></div><div class="case-item"><div class="badge-icon icon-btn"><i class="fa-solid fa-puzzle-piece"></i></div><div class="item-copy"><h4>AS24051812 · 少件</h4><p>柜体五金包缺失，客户申请加急补发。</p><div class="tag-row" style="margin-top:8px"><span class="tag">重新配送</span><span class="tag">无需退款</span></div></div><span class="pill warning">待处理</span></div></div></section>
<section class="section-block"><div class="section-title"><h3>处理方案</h3><span>建议</span></div><div class="form-grid"><div class="form-field"><label>处理意见</label><div class="value">确认破损属实</div></div><div class="form-field"><label>方案</label><div class="value">重新配送</div></div><div class="form-field"><label>费用承担</label><div class="value">供应商承担</div></div><div class="form-field"><label>凭证</label><div class="value">已上传 2 张</div></div></div></section>
<section class="section-block"><div class="auth-banner"><strong>审核提醒</strong><p class="small-note" style="margin:6px 0 0">售后方案提交后进入平台审核，审核通过后触发补发、维修或退款流程。</p></div></section>
</div><nav class="bottom-tabbar"><div class="tabbar-inner"><div class="tab-item"><i class="fa-solid fa-house"></i>首页</div><div class="tab-item"><i class="fa-solid fa-couch"></i>商品</div><div class="tab-item active"><i class="fa-solid fa-truck"></i>履约</div><div class="tab-item"><i class="fa-solid fa-chart-line"></i>数据</div><div class="tab-item"><i class="fa-solid fa-user"></i>我的</div></div></nav></main></div></div></div></body></html>
